<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Task Manager</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <div class="auth-page">
    <div class="auth-hero">
      <div>
        <h1>Task Manager</h1>
        <p>Organize your tasks, boost your productivity. Sign in to manage your work efficiently.</p>
      </div>
    </div>
    <div class="auth-panel">
      <div class="auth-header">
        <button type="button" class="icon-btn" data-theme-toggle data-theme-icon aria-label="Toggle theme"></button>
      </div>
      <div class="auth-form-wrap">
        <div class="auth-form-box">
          <h2>Sign in</h2>
          <p class="auth-subtitle">Don't have an account? <a href="/register.html">Register</a></p>
          <form id="loginForm" novalidate>
            <div class="form-group">
              <label class="form-label" for="email">Email</label>
              <input type="email" id="email" name="email" class="form-input" placeholder="you@example.com" autocomplete="email" required>
            </div>
            <div class="form-group">
              <label class="form-label" for="password">Password</label>
              <input type="password" id="password" name="password" class="form-input" placeholder="••••••••" autocomplete="current-password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-block" id="submitBtn">Sign in</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <script src="/js/toast.js"></script>
  <script src="/js/loader.js"></script>
  <script src="/js/theme.js"></script>
  <script src="/js/auth.js"></script>
  <script src="/js/validation.js"></script>
  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
